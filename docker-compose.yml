services:
  mysql:
    image: mysql:8.0
    container_name: skylark-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-skylark_permission}
      - MYSQL_USER=${MYSQL_USER:-dev}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-123456}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 25s

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
      args:
        MAVEN_BUILD_IMAGE: ${MAVEN_BUILD_IMAGE:-maven:3.9-eclipse-temurin-17}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:17-jre-alpine}
    container_name: gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-80}:80"
    environment:
      - TZ=Asia/Shanghai
      - services.permission.uri=${GATEWAY_PERMISSION_URI:-http://permission}
      - services.business.uri=${GATEWAY_BUSINESS_URI:-http://business-service}
    depends_on:
      permission:
        condition: service_started

  permission-app:
    build:
      context: ./permission-pc
      dockerfile: Dockerfile
    container_name: permission-app
    restart: unless-stopped
    ports:
      - "${PERMISSION_APP_PORT:-9527}:80"
    depends_on:
      gateway:
        condition: service_started

  permission:
    build:
      context: ./permission
      dockerfile: Dockerfile
      args:
        MAVEN_BUILD_IMAGE: ${MAVEN_BUILD_IMAGE:-maven:3.9-eclipse-temurin-17}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:17-jre-alpine}
    container_name: permission
    restart: unless-stopped
    ports:
      - "${PERMISSION_PORT:-19527}:80"
    environment:
      - TZ=Asia/Shanghai
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${PERMISSION_DB_NAME:-skylark_permission}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=${PERMISSION_DB_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${PERMISSION_DB_PASSWORD:-123456}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - FILE_UPLOAD_PATH=/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - permission_uploads:/app/uploads



  business-service:
    build:
      context: .
      dockerfile: service/business-service/Dockerfile
      args:
        MAVEN_BUILD_IMAGE: ${MAVEN_BUILD_IMAGE:-maven:3.9-eclipse-temurin-17}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:17-jre-alpine}
    container_name: business-service
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - SERVER_PORT=80
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${BUSINESS_DB_NAME:-skylark_business}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=${BUSINESS_DB_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${BUSINESS_DB_PASSWORD:-123456}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - OAUTH_SIGNINGKEY=${OAUTH_SIGNINGKEY:-374SJADK&*@!SHSAshhsdevops(90)}
      - SKYLARK_AUTHZ_ENABLED=true
      - SKYLARK_AUTHZ_APP_CODE=business-service
      - SKYLARK_AUTHZ_PERMISSION_BASE_URL=http://permission
      - SKYLARK_AUTHZ_CLIENT_ID=skylark-service
      - SKYLARK_AUTHZ_CLIENT_SECRET=112233
      - SKYLARK_AUTHZ_SYNC_FIXED_DELAY_MS=30000
      - SKYLARK_AUTHZ_IGNORE_PATHS_0=/actuator/**
    depends_on:
      mysql:
        condition: service_healthy


  business-web:
    build:
      context: .
      dockerfile: web/apps/business-web/Dockerfile
    container_name: business-web
    restart: unless-stopped
    ports:
      - "9531:80"
    depends_on:
      gateway:
        condition: service_started

volumes:
  mysql_data:
  permission_uploads:
