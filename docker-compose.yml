services:
  mysql:
    image: mysql:8.0
    container_name: skylark-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-skylark_permission}
      - MYSQL_USER=${MYSQL_USER:-dev}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-123456}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 25s

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
      args:
        MAVEN_BUILD_IMAGE: ${MAVEN_BUILD_IMAGE:-maven:3.9-eclipse-temurin-17}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:17-jre-alpine}
    container_name: gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-80}:80"
    environment:
      - TZ=Asia/Shanghai
      - services.permission.uri=${GATEWAY_PERMISSION_URI:-http://permission}
      - services.business.uri=${GATEWAY_BUSINESS_URI:-http://business-service}
    depends_on:
      permission:
        condition: service_started

  permission-app:
    build:
      context: ./permission-pc
      dockerfile: Dockerfile
    container_name: permission-app
    restart: unless-stopped
    ports:
      - "${PERMISSION_APP_PORT:-9527}:80"
    depends_on:
      gateway:
        condition: service_started

  permission:
    build:
      context: .
      dockerfile: permission/Dockerfile
      args:
        MAVEN_BUILD_IMAGE: ${MAVEN_BUILD_IMAGE:-maven:3.9-eclipse-temurin-17}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:17-jre-alpine}
    container_name: permission
    restart: unless-stopped
    ports:
      - "${PERMISSION_PORT:-19527}:80"
    environment:
      - TZ=Asia/Shanghai
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${PERMISSION_DB_NAME:-skylark_permission}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=${PERMISSION_DB_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${PERMISSION_DB_PASSWORD:-123456}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - FILE_UPLOAD_PATH=/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - permission_uploads:/app/uploads


  business-service:
    build:
      context: .
      dockerfile: service/business-service/Dockerfile
      args:
        MAVEN_BUILD_IMAGE: ${MAVEN_BUILD_IMAGE:-maven:3.9-eclipse-temurin-17}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:17-jre-alpine}
    container_name: business-service
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - SERVER_PORT=80
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${BUSINESS_DB_NAME:-skylark_business}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=${BUSINESS_DB_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${BUSINESS_DB_PASSWORD:-123456}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - OAUTH_SIGNINGKEY=${OAUTH_SIGNINGKEY:-374SJADK&*@!SHSAshhsdevops(90)}
      - SKYLARK_AUTHZ_ENABLED=true
      - SKYLARK_AUTHZ_APP_CODE=business-service
      - SKYLARK_AUTHZ_PERMISSION_BASE_URL=http://permission
      - SKYLARK_AUTHZ_CLIENT_ID=skylark-service
      - SKYLARK_AUTHZ_CLIENT_SECRET=112233
      - SKYLARK_AUTHZ_SYNC_FIXED_DELAY_MS=30000
      - SKYLARK_AUTHZ_IGNORE_PATHS_0=/actuator/**
    depends_on:
      mysql:
        condition: service_healthy


  business-web:
    build:
      context: .
      dockerfile: web/apps/business-web/Dockerfile
    container_name: business-web
    restart: unless-stopped
    ports:
      - "9531:80"
    depends_on:
      gateway:
        condition: service_started



  aiot-service:
    build:
      context: .
      dockerfile: service/aiot-service/Dockerfile
      args:
        MAVEN_BUILD_IMAGE: ${MAVEN_BUILD_IMAGE:-maven:3.9-eclipse-temurin-17}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:17-jre-alpine}
    container_name: aiot-service
    restart: unless-stopped
    ports:
      - "9533:80"
    environment:
      - TZ=Asia/Shanghai
      - SERVER_PORT=80
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${AIOT_DB_NAME:-skylark_aiot}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=${AIOT_DB_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${AIOT_DB_PASSWORD:-123456}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - OAUTH_SIGNINGKEY=${OAUTH_SIGNINGKEY:-374SJADK&*@!SHSAshhsdevops(90)}
      - SKYLARK_AUTHZ_ENABLED=true
      - SKYLARK_AUTHZ_APP_CODE=aiot-service
      - SKYLARK_AUTHZ_PERMISSION_BASE_URL=http://permission
      - SKYLARK_AUTHZ_CLIENT_ID=skylark-service
      - SKYLARK_AUTHZ_CLIENT_SECRET=112233
      - SKYLARK_AUTHZ_SYNC_FIXED_DELAY_MS=30000
      - SKYLARK_AUTHZ_IGNORE_PATHS_0=/actuator/**
      - SKYLARK_AUTHZ_IGNORE_PATHS_1=/api/aiot-service/public/**
      - SKYLARK_AUTHZ_IGNORE_PATHS_2=/api/aiot-service/access/**
      - IOT_ACCESS_EMQX_BASE_URL=http://emqx:18083
      - IOT_ACCESS_EMQX_API_KEY=${EMQX_API_KEY:-}
      - IOT_ACCESS_EMQX_API_SECRET=${EMQX_API_SECRET:-}
      - IOT_ACCESS_EMQX_DASHBOARD_USERNAME=${EMQX_DASHBOARD_USERNAME:-admin}
      - IOT_ACCESS_EMQX_DASHBOARD_PASSWORD=${EMQX_DASHBOARD_PASSWORD:-public}
      - IOT_ACCESS_AUTH_USE_DB=${IOT_ACCESS_AUTH_USE_DB:-true}
      - IOT_ACCESS_ACL_USE_DB=${IOT_ACCESS_ACL_USE_DB:-true}
      - IOT_ACCESS_WEBHOOK_ENABLED=${IOT_ACCESS_WEBHOOK_ENABLED:-true}
      - IOT_ACCESS_WEBHOOK_SECRET=${IOT_ACCESS_WEBHOOK_SECRET:-}
    depends_on:
      mysql:
        condition: service_healthy
      emqx:
        condition: service_started


  aiot-web:
    build:
      context: .
      dockerfile: web/apps/aiot-web/Dockerfile
    container_name: aiot-web
    restart: unless-stopped
    ports:
      - "9532:80"
    depends_on:
      gateway:
        condition: service_started

  emqx:
    image: emqx/emqx:5.0.26
    container_name: emqx
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8883:8883"
      - "8083:8083"
      - "8084:8084"
      - "18083:18083"
    environment:
      - TZ=Asia/Shanghai
      - EMQX_DASHBOARD__DEFAULT_USERNAME=${EMQX_DASHBOARD_USERNAME:-admin}
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=${EMQX_DASHBOARD_PASSWORD:-public}
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log

  emqx-init:
    image: curlimages/curl:8.7.1
    container_name: emqx-init
    depends_on:
      emqx:
        condition: service_started
      aiot-service:
        condition: service_started
    environment:
      - EMQX_API_KEY=${EMQX_API_KEY:-}
      - EMQX_API_SECRET=${EMQX_API_SECRET:-}
      - EMQX_DASHBOARD_USERNAME=${EMQX_DASHBOARD_USERNAME:-admin}
      - EMQX_DASHBOARD_PASSWORD=${EMQX_DASHBOARD_PASSWORD:-public}
      - EMQX_SYSTEM_API_USERNAME=${EMQX_SYSTEM_API_USERNAME:-system}
      - SYSTEM_API_PASSWORD=${SYSTEM_API_PASSWORD:-}
      - IOT_ACCESS_WEBHOOK_SECRET=${IOT_ACCESS_WEBHOOK_SECRET:-}
      - EMQX_HOST=http://emqx:18083
      - IOT_ACCESS_HOST=http://aiot-service:80
    volumes:
      - ./service/aiot-service/scripts/init-emqx.sh:/init-emqx.sh:ro
    entrypoint: ["/bin/sh", "/init-emqx.sh"]
    restart: "no"

volumes:
  mysql_data:
  permission_uploads:
  emqx_data:
  emqx_log:
