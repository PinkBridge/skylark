server:
  port: 80

spring:
  application:
    name: skylark-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: permission-api-service
          uri: ${services.permission.uri:http://permission}
          predicates:
            - Path=/api/permission/**
          filters:
            - PreserveHostHeader
        - id: permission-oauth-service
          uri: ${services.permission.uri:http://permission}
          predicates:
            - Path=/oauth/**
          filters:
            - PreserveHostHeader
            - RewritePath=/oauth/(?<segment>.*), /oauth/${segment}
        - id: permission-login-service
          uri: ${services.permission.uri:http://permission}
          predicates:
            - Path=/login,/login/**
          filters:
            - PreserveHostHeader

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
