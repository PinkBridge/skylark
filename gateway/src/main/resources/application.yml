server:
  port: 80

spring:
  application:
    name: skylark-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: permission-api-service
          uri: ${services.permission.uri:http://permission}
          order: -10
          predicates:
            - Path=/api/permission/**
          filters:
            - PreserveHostHeader
        - id: business-api-service
          uri: ${services.business.uri:http://business-service}
          order: -10
          predicates:
            - Path=/api/business-service/**
          filters:
            - PreserveHostHeader
        - id: permission-oauth-service
          uri: ${services.permission.uri:http://permission}
          order: -10
          predicates:
            - Path=/oauth/**
          filters:
            - PreserveHostHeader
            # /oauth/** -> permission's legacy OAuth2 endpoints (/oauth/*)
            - RewritePath=/oauth/(?<segment>.*), /oauth/${segment}
        - id: permission-login-service
          uri: ${services.permission.uri:http://permission}
          order: -10
          predicates:
            - Path=/login,/login/**
          filters:
            - PreserveHostHeader
        - id: api-dynamic-service
          uri: http://localhost
          order: 100
          predicates:
            - Path=/api/**
          filters:
            - PreserveHostHeader

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
